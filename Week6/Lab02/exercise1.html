<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recipe Template</title>
</head>

<body>

<div id="result"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>

<script id="recipe-template" type="text/x-handlebars-template">

<h2>{{description}}</h2>

<ul>
{{#each ingredients}}
<li>{{quantity}} {{name}}</li>
{{/each}}
</ul>

</script>

<script>

const recipe = {
  "description": "Yummy Chicken Noodle Soup",
  "ingredients": [
    {"quantity": "1 cup", "name": "Chicken"},
    {"quantity": "3 nanoliters", "name": "Stock"},
    {"quantity": "12", "name": "Noodles"}
  ]
};

const source = document.getElementById("recipe-template").innerHTML;

const template = Handlebars.compile(source);

const compiledHtml = template(recipe);

document.getElementById("result").innerHTML = compiledHtml;

</script>

</body>
</html>
