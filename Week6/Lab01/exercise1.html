<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Template Exercise 1</title>
</head>

<body>

<div id="result"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>

<script id="handlebars-demo" type="text/x-handlebars-template">
   <div>
      You can find me in <strong>{{city}}</strong>. My address is <strong>{{number}} {{street}}</strong>.
   </div>
</script>

<script>

const context = {
    city: "London",
    street: "Baker Street",
    number: "221B"
};


const source = document.getElementById("handlebars-demo").innerHTML;

const template = Handlebars.compile(source);

const compiledHtml = template(context);

document.getElementById("result").innerHTML = compiledHtml;

</script>

</body>
</html>
