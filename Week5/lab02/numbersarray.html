<h1>Array (Looping through an array)</h1>
<p></p>
<script>

const numbers = [1, 12, 4, 18, 9, 7, 11, 3, 50, 5, 6]
let para = document.querySelector('p');
para.insertAdjacentHTML('beforeend', `<b>${numbers}</b><br>`);
para.insertAdjacentHTML('beforeend', `<br><b>Loop through the numbers.</b><br>`)
for (const num1 of numbers) {
  para.insertAdjacentHTML('beforeend', `${num1}<br>`)
}
